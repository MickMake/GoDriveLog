# GoDriveLog v3 dashboard example
# Inspired by the Honda S2000 digital cluster.
# The Hagerty article describes a sweeping rev counter with a 9000rpm red zone,
# plus temperature and fuel gauges alongside it.

vehicles:
  vw_caddy:
    name: "VW Caddy"
    obd:
      address: "serial:///dev/ttyUSB0"
      timeout: 1000

sensors:
  speed:
    type: obd
    pid: "010D"
    unit: "km/h"
    poll: 250
    min: 0
    max: 220

  rpm:
    type: obd
    pid: "010C"
    unit: "rpm"
    poll: 250
    min: 0
    max: 9000

  coolant_temperature:
    type: obd
    pid: "0105"
    unit: "C"
    poll: 5000
    min: -40
    max: 140

  fuel_level:
    type: obd
    pid: "012F"
    unit: "%"
    poll: 5000
    min: 0
    max: 100

  engine_warning:
    type: obd
    pid: "STATUS:MIL"
    unit: "bool"
    poll: 1000

assets:
  digit_sets:
    s2000_speed_digits:
      background: "assets/s2000/speed_digits/digit_back.png"
      characters:
        "0": "assets/s2000/speed_digits/speed0.png"
        "1": "assets/s2000/speed_digits/speed1.png"
        "2": "assets/s2000/speed_digits/speed2.png"
        "3": "assets/s2000/speed_digits/speed3.png"
        "4": "assets/s2000/speed_digits/speed4.png"
        "5": "assets/s2000/speed_digits/speed5.png"
        "6": "assets/s2000/speed_digits/speed6.png"
        "7": "assets/s2000/speed_digits/speed7.png"
        "8": "assets/s2000/speed_digits/speed8.png"
        "9": "assets/s2000/speed_digits/speed9.png"
        "-": "assets/s2000/speed_digits/speed_minus.png"
      decimal_point: "assets/s2000/speed_digits/speedDP.png"
      foreground: "assets/s2000/speed_digits/digit_glass.png"
      spacing: 3

  bar_sets:
    s2000_side_bar:
      background: "assets/s2000/side_bar/bar_back.png"
      cells:
        off: "assets/s2000/side_bar/cell_off.png"
        on: "assets/s2000/side_bar/cell_on.png"
        warning: "assets/s2000/side_bar/cell_warning.png"
      foreground: "assets/s2000/side_bar/bar_glass.png"
      spacing: 1

  frame_sets:
    s2000_rpm_sweep:
      background: "assets/s2000/rpm/rpm_back.png"
      frames:
        path: "assets/s2000/rpm/rpm_%03d.png"
        first: 0
        last: 120
      foreground: "assets/s2000/rpm/rpm_glass.png"

  indicator_sets:
    engine_warning:
      background: "assets/s2000/warnings/engine_back.png"
      states:
        off: "assets/s2000/warnings/engine_off.png"
        on: "assets/s2000/warnings/engine_on.png"
        unknown: "assets/s2000/warnings/engine_unknown.png"
      foreground: "assets/s2000/warnings/engine_glass.png"

  image_sets:
    main_panel:
      image: "assets/s2000/panel/main_panel_backplate.png"

logs:
  jsonl:
    path: "logs/godrivelog.jsonl"
    sensors:
      - speed
      - rpm
      - coolant_temperature
      - fuel_level
      - engine_warning


dashboards:
  s2000_primary:
    display: "HDMI-1"
    size:
      width: 1920
      height: 480
    widgets:
      - id: panel_backplate
        type: image
        asset: main_panel
        position: [0, 0]

      - id: rpm_sweep
        type: frame_gauge
        sensor: rpm
        asset: s2000_rpm_sweep
        position: [84, 26]
        min: 0
        max: 9000

      - id: speed_digits
        type: digit_display
        sensor: speed
        asset: s2000_speed_digits
        position: [770, 185]
        digits: 3
        format: "%03.0f"

      - id: coolant_temperature_bar
        type: bar_display
        sensor: coolant_temperature
        asset: s2000_side_bar
        position: [1370, 80]
        cells: 16
        min: 40
        max: 120
        zones:
          - up_to: 105
            cell: on
          - up_to: 120
            cell: warning

      - id: fuel_bar
        type: bar_display
        sensor: fuel_level
        asset: s2000_side_bar
        position: [1370, 205]
        cells: 16
        min: 0
        max: 100
        reverse: true

      - id: engine_warning
        type: indicator
        sensor: engine_warning
        asset: engine_warning
        position: [1480, 340]
