# GoDriveLog v3 full configuration example
#
# Purpose:
#   This is the complete, heavily-commented v3 configuration reference.
#   It is intentionally verbose. Use config.example.yaml for a smaller starter.
#
# Top-level sections:
#   vehicles   - available vehicle/endpoint profiles
#   sensors    - global sensor catalogue and polling rules
#   assets     - reusable visual asset packs
#   logs       - event-log subscribers
#   dashboards - physical display dashboards and widgets
#
# Core runtime model:
#   vehicle endpoint -> sensor polling runtime -> sensor events -> logs/dashboards
#
# Schema rule:
#   Treat the documented top-level sections as an allow-list.
#   Unknown root fields should fail validation during v3 implementation.
#
# Runtime selection:
#   If exactly one vehicle exists, the runtime may use it automatically.
#   If multiple vehicles exist, require an explicit CLI/runtime choice such as
#   --vehicle <id>.
#
# Dashboard activation:
#   Dashboard presence means active. Each dashboard owns its display target.
#
# Endpoint model:
#   GoDriveLog connects to an OBD-like endpoint address. Real hardware and
#   simulator endpoints use the same connection path.
#
# Log model:
#   Logs subscribe to sensor events. Sensors own polling.

vehicles:
  # Vehicle ID. This is the stable key used by CLI/runtime selection.
  vw_caddy:
    # Human-readable name for UI/log metadata.
    name: "VW Caddy"

    # OBD-like endpoint used by this vehicle profile.
    obd:
      # address is the transport endpoint.
      # Examples:
      #   serial:///dev/ttyUSB0      real USB ELM327-style adapter
      #   serial:///dev/rfcomm0      Bluetooth serial adapter
      #   tcp://127.0.0.1:35000     bench/simulator endpoint
      address: "serial:///dev/ttyUSB0"

      # timeout is the transport/read timeout in milliseconds.
      timeout: 1000

  # Bench profile. This is not a different source type. It is just another
  # endpoint that speaks enough OBD/ELM327-ish protocol for development.
  bench:
    name: "Bench simulator"
    obd:
      address: "tcp://127.0.0.1:35000"
      timeout: 1000

sensors:
  # Sensor ID. This is the stable key used by logs and dashboard widgets.
  speed:
    # type identifies how the sensor is read. v3 starts boring: obd.
    type: obd
    # pid is the OBD request/PID or well-known adapter command.
    pid: "010D"
    # unit is the value label used by logs and dashboards.
    unit: "km/h"
    # poll is the requested polling cadence in milliseconds.
    # Only sensors own timing.
    poll: 250
    # min/max are expected bounds for validation and display scaling.
    min: 0
    max: 220

  rpm:
    type: obd
    pid: "010C"
    unit: "rpm"
    poll: 250
    min: 0
    max: 7000

  coolant_temperature:
    type: obd
    pid: "0105"
    unit: "C"
    poll: 5000
    min: -40
    max: 140

  throttle_position:
    type: obd
    pid: "0111"
    unit: "%"
    poll: 500
    min: 0
    max: 100

  fuel_level:
    type: obd
    pid: "012F"
    unit: "%"
    poll: 5000
    min: 0
    max: 100

  battery_voltage:
    type: obd
    pid: "ATRV"
    unit: "V"
    poll: 5000
    min: 10
    max: 15

  engine_warning:
    # Boolean status sensor. Renderer maps true/false plus sensor status to
    # indicator states. Do not encode UI colours into sensor values.
    type: obd
    pid: "STATUS:MIL"
    unit: "bool"
    poll: 1000

  high_beam:
    # Placeholder for a future vehicle-status input. Keep this separate from
    # OBD PID sensors if the value does not come from standard OBD polling.
    type: vehicle_status
    unit: "bool"
    poll: 500

assets:
  # digit_sets are image-backed character displays.
  # Render order for each character slot:
  #   1. draw background if present
  #   2. draw resolved character overlay if present
  #   3. draw decimal_point overlay if the formatted value contains a decimal
  #   4. draw foreground if present
  #
  # A blank/padded slot means background-only. No blank image is needed when a
  # background exists.
  digit_sets:
    bttf_amber_digits:
      # Per-character slot background. Usually an unlit digit cavity.
      background: "assets/dashboard/bttf/amber_digits/digit_back.png"
      # characters maps formatted text characters to image overlays.
      # The minus sign is first-class, because negative values happen.
      characters:
        "0": "assets/dashboard/bttf/amber_digits/amber0.png"
        "1": "assets/dashboard/bttf/amber_digits/amber1.png"
        "2": "assets/dashboard/bttf/amber_digits/amber2.png"
        "3": "assets/dashboard/bttf/amber_digits/amber3.png"
        "4": "assets/dashboard/bttf/amber_digits/amber4.png"
        "5": "assets/dashboard/bttf/amber_digits/amber5.png"
        "6": "assets/dashboard/bttf/amber_digits/amber6.png"
        "7": "assets/dashboard/bttf/amber_digits/amber7.png"
        "8": "assets/dashboard/bttf/amber_digits/amber8.png"
        "9": "assets/dashboard/bttf/amber_digits/amber9.png"
        "-": "assets/dashboard/bttf/amber_digits/amber_minus.png"
      # decimal_point is an overlay, not a normal character slot.
      decimal_point: "assets/dashboard/bttf/amber_digits/amber_dp.png"
      # foreground is optional glass/bezel/reflection overlay per slot.
      foreground: "assets/dashboard/bttf/amber_digits/digit_glass.png"
      # spacing is pixels between character slots at native asset size.
      spacing: 4

    bttf_green_digits:
      background: "assets/dashboard/bttf/green_digits/digit_back.png"
      characters:
        "0": "assets/dashboard/bttf/green_digits/green0.png"
        "1": "assets/dashboard/bttf/green_digits/green1.png"
        "2": "assets/dashboard/bttf/green_digits/green2.png"
        "3": "assets/dashboard/bttf/green_digits/green3.png"
        "4": "assets/dashboard/bttf/green_digits/green4.png"
        "5": "assets/dashboard/bttf/green_digits/green5.png"
        "6": "assets/dashboard/bttf/green_digits/green6.png"
        "7": "assets/dashboard/bttf/green_digits/green7.png"
        "8": "assets/dashboard/bttf/green_digits/green8.png"
        "9": "assets/dashboard/bttf/green_digits/green9.png"
        "-": "assets/dashboard/bttf/green_digits/green_minus.png"
      decimal_point: "assets/dashboard/bttf/green_digits/green_dp.png"
      foreground: "assets/dashboard/bttf/green_digits/digit_glass.png"
      spacing: 4

    s2000_speed_digits:
      background: "assets/dashboard/s2000/speed_digits/digit_back.png"
      characters:
        "0": "assets/dashboard/s2000/speed_digits/speed0.png"
        "1": "assets/dashboard/s2000/speed_digits/speed1.png"
        "2": "assets/dashboard/s2000/speed_digits/speed2.png"
        "3": "assets/dashboard/s2000/speed_digits/speed3.png"
        "4": "assets/dashboard/s2000/speed_digits/speed4.png"
        "5": "assets/dashboard/s2000/speed_digits/speed5.png"
        "6": "assets/dashboard/s2000/speed_digits/speed6.png"
        "7": "assets/dashboard/s2000/speed_digits/speed7.png"
        "8": "assets/dashboard/s2000/speed_digits/speed8.png"
        "9": "assets/dashboard/s2000/speed_digits/speed9.png"
        "-": "assets/dashboard/s2000/speed_digits/speed_minus.png"
      decimal_point: "assets/dashboard/s2000/speed_digits/speed_dp.png"
      foreground: "assets/dashboard/s2000/speed_digits/digit_glass.png"
      spacing: 3

  # bar_sets are repeated cell displays.
  # Render order:
  #   background -> off/on/warning cells -> foreground
  bar_sets:
    bttf_green_bar:
      background: "assets/dashboard/bttf/bars/green_bar_back.png"
      cells:
        off: "assets/dashboard/bttf/bars/green_cell_off.png"
        on: "assets/dashboard/bttf/bars/green_cell_on.png"
        warning: "assets/dashboard/bttf/bars/green_cell_warning.png"
      foreground: "assets/dashboard/bttf/bars/green_bar_glass.png"
      spacing: 2

    z31_rainbow_speed_bar:
      background: "assets/dashboard/z31/speed_bar/bar_back.png"
      cells:
        off: "assets/dashboard/z31/speed_bar/cell_off.png"
        on_low: "assets/dashboard/z31/speed_bar/cell_green.png"
        on_mid: "assets/dashboard/z31/speed_bar/cell_yellow.png"
        on_high: "assets/dashboard/z31/speed_bar/cell_red.png"
      foreground: "assets/dashboard/z31/speed_bar/bar_glass.png"
      spacing: 2

    s2000_side_bar:
      background: "assets/dashboard/s2000/side_bar/bar_back.png"
      cells:
        off: "assets/dashboard/s2000/side_bar/cell_off.png"
        on: "assets/dashboard/s2000/side_bar/cell_on.png"
        warning: "assets/dashboard/s2000/side_bar/cell_warning.png"
      foreground: "assets/dashboard/s2000/side_bar/bar_glass.png"
      spacing: 1

  # frame_sets are pre-rendered frames for gauges or complex state displays.
  # Use this for curved/sweeping/fancy visuals instead of inventing a YAML
  # drawing language.
  frame_sets:
    bttf_throttle_frames:
      background: "assets/dashboard/bttf/throttle/throttle_back.png"
      frames:
        path: "assets/dashboard/bttf/throttle/frame_%03d.png"
        first: 0
        last: 100
      foreground: "assets/dashboard/bttf/throttle/throttle_glass.png"

    z31_rpm_boost_sweep:
      background: "assets/dashboard/z31/rpm_boost/rpm_boost_back.png"
      frames:
        path: "assets/dashboard/z31/rpm_boost/frame_%03d.png"
        first: 0
        last: 100
      foreground: "assets/dashboard/z31/rpm_boost/rpm_boost_glass.png"

    s2000_rpm_sweep:
      background: "assets/dashboard/s2000/rpm/rpm_back.png"
      frames:
        path: "assets/dashboard/s2000/rpm/rpm_%03d.png"
        first: 0
        last: 120
      foreground: "assets/dashboard/s2000/rpm/rpm_glass.png"

  # indicator_sets are on/off/unknown image states for boolean/status lights.
  # Runtime rule:
  #   sensor status != ok -> unknown
  #   sensor status == ok and value == true -> on
  #   sensor status == ok and value == false -> off
  indicator_sets:
    engine_warning:
      background: "assets/dashboard/warnings/engine_back.png"
      states:
        off: "assets/dashboard/warnings/engine_off.png"
        on: "assets/dashboard/warnings/engine_on.png"
        unknown: "assets/dashboard/warnings/engine_unknown.png"
      foreground: "assets/dashboard/warnings/engine_glass.png"

    high_beam:
      background: "assets/dashboard/warnings/highbeam_back.png"
      states:
        off: "assets/dashboard/warnings/highbeam_off.png"
        on: "assets/dashboard/warnings/highbeam_on.png"
        unknown: "assets/dashboard/warnings/highbeam_unknown.png"
      foreground: "assets/dashboard/warnings/highbeam_glass.png"

    oil_pressure_warning:
      background: "assets/dashboard/warnings/oil_back.png"
      states:
        off: "assets/dashboard/warnings/oil_off.png"
        on: "assets/dashboard/warnings/oil_on.png"
        unknown: "assets/dashboard/warnings/oil_unknown.png"
      foreground: "assets/dashboard/warnings/oil_glass.png"

    battery_warning:
      background: "assets/dashboard/warnings/battery_back.png"
      states:
        off: "assets/dashboard/warnings/battery_off.png"
        on: "assets/dashboard/warnings/battery_on.png"
        unknown: "assets/dashboard/warnings/battery_unknown.png"
      foreground: "assets/dashboard/warnings/battery_glass.png"

  # image_sets are static images or image sandwiches.
  image_sets:
    bttf_panel:
      image: "assets/dashboard/bttf/panel/background.png"

    z31_panel:
      image: "assets/dashboard/z31/panel/main_panel_backplate.png"

    s2000_panel:
      image: "assets/dashboard/s2000/panel/main_panel_backplate.png"

logs:
  # jsonl is an event-log subscriber.
  jsonl:
    # path is the output JSON Lines file.
    path: "logs/godrivelog.jsonl"
    # sensors selects which sensor events should be logged.
    # First readings, value changes, and status changes should be written.
    # Unchanged duplicate values should not spam the log.
    sensors:
      - speed
      - rpm
      - coolant_temperature
      - throttle_position
      - fuel_level
      - battery_voltage
      - engine_warning

dashboards:
  # Existing/simple BTTF-style example.
  bttf_primary:
    # display is the physical/logical display target for this dashboard.
    display: "HDMI-1"
    # size is the dashboard design/render target size in pixels.
    size:
      width: 1920
      height: 480
    widgets:
      - id: panel_backplate
        # image draws a static image asset.
        type: image
        asset: bttf_panel
        position: [0, 0]

      - id: speed_digits
        # digit_display renders formatted sensor values using a digit_set.
        type: digit_display
        sensor: speed
        asset: bttf_amber_digits
        position: [40, 40]
        digits: 3
        format: "%03.0f"

      - id: rpm_digits
        type: digit_display
        sensor: rpm
        asset: bttf_amber_digits
        position: [40, 180]
        digits: 4
        format: "%04.0f"

      - id: throttle_bar
        # frame_gauge maps a sensor value range onto a frame_set.
        type: frame_gauge
        sensor: throttle_position
        asset: bttf_throttle_frames
        position: [40, 320]
        min: 0
        max: 100

      - id: engine_warning
        # indicator maps boolean/status sensor values onto off/on/unknown images.
        type: indicator
        sensor: engine_warning
        asset: engine_warning
        position: [1520, 340]

  # Nissan 300ZX Z31-inspired example from the retro dashboard discussion.
  # Inspired by digital speed plus colourful bar displays and RPM/boost styling.
  z31_primary:
    display: "HDMI-1"
    size:
      width: 1920
      height: 480
    widgets:
      - id: panel_backplate
        type: image
        asset: z31_panel
        position: [0, 0]

      - id: speed_digits
        type: digit_display
        sensor: speed
        asset: bttf_amber_digits
        position: [92, 42]
        digits: 3
        format: "%03.0f"

      - id: speed_bar
        # bar_display maps value range to filled cells. zones optionally choose
        # different cell images for different ranges.
        type: bar_display
        sensor: speed
        asset: z31_rainbow_speed_bar
        position: [92, 210]
        cells: 44
        min: 0
        max: 220
        zones:
          - up_to: 80
            cell: on_low
          - up_to: 140
            cell: on_mid
          - up_to: 220
            cell: on_high

      - id: rpm_boost_sweep
        type: frame_gauge
        sensor: rpm
        asset: z31_rpm_boost_sweep
        position: [660, 38]
        min: 0
        max: 7000

      - id: coolant_bar
        type: bar_display
        sensor: coolant_temperature
        asset: bttf_green_bar
        position: [1130, 70]
        cells: 18
        min: 40
        max: 120

      - id: fuel_bar
        type: bar_display
        sensor: fuel_level
        asset: bttf_green_bar
        position: [1130, 150]
        cells: 18
        min: 0
        max: 100

      - id: voltage_digits
        type: digit_display
        sensor: battery_voltage
        asset: bttf_green_digits
        position: [1430, 70]
        digits: 4
        format: "%04.1f"

      - id: engine_warning
        type: indicator
        sensor: engine_warning
        asset: engine_warning
        position: [1430, 280]

      - id: high_beam
        type: indicator
        sensor: high_beam
        asset: high_beam
        position: [1530, 280]

  # Honda S2000-inspired example from the retro dashboard discussion.
  # Dominated by a sweeping rev counter, with speed digits and side gauges.
  s2000_primary:
    display: "HDMI-1"
    size:
      width: 1920
      height: 480
    widgets:
      - id: panel_backplate
        type: image
        asset: s2000_panel
        position: [0, 0]

      - id: rpm_sweep
        type: frame_gauge
        sensor: rpm
        asset: s2000_rpm_sweep
        position: [84, 26]
        min: 0
        max: 9000

      - id: speed_digits
        type: digit_display
        sensor: speed
        asset: s2000_speed_digits
        position: [770, 185]
        digits: 3
        format: "%03.0f"

      - id: coolant_temperature_bar
        type: bar_display
        sensor: coolant_temperature
        asset: s2000_side_bar
        position: [1370, 80]
        cells: 16
        min: 40
        max: 120
        zones:
          - up_to: 105
            cell: on
          - up_to: 120
            cell: warning

      - id: fuel_bar
        type: bar_display
        sensor: fuel_level
        asset: s2000_side_bar
        position: [1370, 205]
        cells: 16
        min: 0
        max: 100
        reverse: true

      - id: engine_warning
        type: indicator
        sensor: engine_warning
        asset: engine_warning
        position: [1480, 340]

      - id: high_beam
        type: indicator
        sensor: high_beam
        asset: high_beam
        position: [1560, 340]
