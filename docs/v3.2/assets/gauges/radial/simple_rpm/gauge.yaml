id: simple_radial_rpm
type: radial
sensor: rpm

size:
  width: 512
  height: 512

layers:
  background: bezel.png
  face: face.png
  ticks: ticks.png
  needle: needle.png
  overlay: glass.png

pivot:
  face: { x: 0.5, y: 0.55 }
  needle: { x: 0.5, y: 0.9 }

value_map:
  min: 0
  max: 7000
  start_angle: -135
  end_angle: 135
  clamp: true
