
name: build

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install Fyne build dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            gcc \
            libgl1-mesa-dev \
            libx11-dev \
            libxcursor-dev \
            libxrandr-dev \
            libxinerama-dev \
            libxi-dev \
            libxxf86vm-dev \
            pkg-config

      - name: Tidy modules
        run: go mod tidy

      - name: v3.2 baseline harness verification and benchmark report
        env:
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: |
          go test -run '^TestBaselineDashboardConfigRunsHarnessPatterns$' ./internal/dashboard/harness
          go test -run '^$' -bench '^BenchmarkBaselineDashboardHarnessPatterns$' -benchmem -count=3 ./internal/dashboard/harness

      - name: Test Code
        run: go test ./...

      - name: Seven-segment benchmark report
        env:
          LANG: C.UTF-8
          LC_ALL: C.UTF-8
        run: go test -bench SevenSegment -benchmem -run '^$' ./internal/dashboard/adapter/fyne

      - name: Build
        run: go build ./cmd/GoDriveLog
