obd:
  provider: mock
  mock_mode: true
  address: serial:///dev/ttyUSB0
  debug: false

log:
  rotate: daily
  directory: ./log

vehicle:
  name: "VW Caddy"

# The fast 1920x480 instrument dashboard is now the normal runtime display.
# This dashboard block remains as a minimal validation placeholder for the
# existing config schema; it is not the active runtime renderer configuration.
dashboard:
  refresh_ms: 250
  render_min_ms: 0
  canvas:
    width: 1920
    height: 480
  assets: []
  decoders: []
  blocks:
    - id: schema_placeholder
      type: text
      geometry:
        x: 0
        y: 0
        width: 1920
        height: 480
  layers:
    - id: base
      z: 0
      blocks:
        - schema_placeholder

sensors:
  engine_load:
    type: obd
    pid: "0104"
    unit: "%"
    refresh: 500
    min: 0
    max: 100
    log: true
  coolant_temp:
    type: obd
    pid: "0105"
    unit: C
    refresh: 1000
    min: -40
    max: 140
    log: true
  short_fuel_trim_bank1:
    type: obd
    pid: "0106"
    unit: "%"
    refresh: 1000
    min: -100
    max: 100
    log: true
  long_fuel_trim_bank1:
    type: obd
    pid: "0107"
    unit: "%"
    refresh: 1000
    min: -100
    max: 100
    log: true
  intake_manifold_pressure:
    type: obd
    pid: "010B"
    unit: kPa
    refresh: 1000
    min: 0
    max: 255
    log: true
  rpm:
    type: obd
    pid: "010C"
    unit: rpm
    refresh: 250
    min: 0
    max: 7000
    log: true
  speed:
    type: obd
    pid: "010D"
    unit: km/h
    refresh: 500
    min: 0
    max: 160
    log: true
  timing_advance:
    type: obd
    pid: "010E"
    unit: deg
    refresh: 1000
    min: -64
    max: 64
    log: false
  intake_air_temp:
    type: obd
    pid: "010F"
    unit: C
    refresh: 2000
    min: -40
    max: 140
    log: true
  mass_air_flow:
    type: obd
    pid: "0110"
    unit: g/s
    refresh: 1000
    min: 0
    max: 655
    log: false
  throttle_position:
    type: obd
    pid: "0111"
    unit: "%"
    refresh: 500
    min: 0
    max: 100
    log: true
  run_time_since_engine_start:
    type: obd
    pid: "011F"
    unit: s
    refresh: 5000
    min: 0
    max: 86400
    log: false
