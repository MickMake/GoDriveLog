id: ornate_timber_radial_rpm
type: radial
sensor: rpm

realism:
  damping: true

size:
  width: 360
  height: 360

layers:
  background: ../../../assets/gauges/radial_rpm/background.png
  face: ../../../assets/gauges/radial_rpm/face.png
  ticks: ../../../assets/gauges/radial_rpm/ticks.png
  needle: ../../../assets/gauges/radial_rpm/needle.png
  overlay: ../../../assets/gauges/radial_rpm/overlay.png

pivot:
  face: { x: 0.5, y: 0.5 }
  needle: { x: 0.5, y: 0.5 }

value_map:
  min: 0
  max: 8000
  start_angle: -135
  end_angle: 135
  clamp: true
