id: ornate_timber_radial_rpm
type: radial
sensor: rpm

realism:
  damping: true
  stiction: 200
  overshoot:
    ratio: 0.15
    min_change_ratio: 0.05
    max_span_ratio: 0.08
    settle_mode: oscillate
    settle_cycles: 1.75
    settle_damping: 4.5
    allow_extremes: true
  peg_bounce: true

size:
  width: 1195
  height: 1207

layers:
  background: ../bezel.png
  face: ../face.png
  ticks: ../ticks.png
  needle: ../needle.png
  overlay: ../glass.png

pivot:
  face: { x: 0.5, y: 0.5 }
  needle: { x: 0.5, y: 0.5 }

value_map:
  min: 0
  max: 8000
  start_angle: -120
  end_angle: 120
  clamp: true
