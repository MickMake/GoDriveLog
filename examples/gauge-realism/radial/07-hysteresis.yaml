vehicles:
  demo:
    name: Gauge Preview
    obd:
      address: preview://manual
      timeout: 1000
    dashboards:
      - preview
sensors:
  rpm:
    type: obd
    pid: "010C"
    unit: rpm
    min: 0
    max: 8000
    poll: 250
dashboards:
  preview:
    display: preview
    size:
      width: 640
      height: 480
    widgets:
      - id: radial_rpm
        type: gauge
        gauge: assets/07-hysteresis
        position: [0, 0]
