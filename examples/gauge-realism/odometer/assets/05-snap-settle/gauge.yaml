id: trip_odometer
type: odometer
sensor: trip_distance

realism:
  snap_settle: true

size:
  width: 640
  height: 240

layers:
  panel: ../panel.png
  glass: ../glass.png

odometer:
  movement: linear
  wheels:
    - strip: ../digits.png
      position: [156, 88]
      window: { width: 64, height: 96 }
    - strip: ../digits.png
      position: [226, 88]
      window: { width: 64, height: 96 }
    - strip: ../tenths.png
      position: [322, 88]
      window: { width: 64, height: 96 }
      role: sub_unit
