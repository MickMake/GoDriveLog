id: pointer_marker_radial_rpm
type: radial
sensor: rpm

realism:
  pointer_markers:
    min: true
    max: true

size:
  width: 1195
  height: 1207

layers:
  background: ../../../../gauge-realism/radial/assets/bezel.png
  face: ../../../../gauge-realism/radial/assets/face.png
  ticks: ../../../../gauge-realism/radial/assets/ticks.png
  needle: ../../../../gauge-realism/radial/assets/needle.png
  needle_min: ../../../../gauge-realism/radial/assets/needle.png
  needle_max: ../../../../gauge-realism/radial/assets/needle.png
  overlay: ../../../../gauge-realism/radial/assets/glass.png

pivot:
